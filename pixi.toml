[workspace]
name = "ops-dashboard"
platforms = ['linux-64', 'osx-arm64', 'osx-64', 'win-64']
channels = [
  'https://repo.prefix.dev/ecoscope-workflows/',
  'https://repo.prefix.dev/ecoscope-workflows-custom/',
  'conda-forge',
]

[dependencies]
wt-compiler = "0.8.1"
graphviz = "*"

[tasks.compile]
cmd = './dev/recompile.sh --install'

[tasks.recompile]
cmd = './dev/recompile.sh --update'
