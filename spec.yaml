      - name: Average Speed Widget
        id: ptrl_avg_speed_widget
        task: create_single_value_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: Average Speed (km/h)
          decimal_places: 1
          data: ${{ workflow.ptrl_avg_speed_converted.return }}

      - id: ptrl_max_speed
        task: dataframe_column_max
        partial:
          df: ${{ workflow.ptrl_traj_to_string.return }}
          column_name: speed_kmhr

      - id: ptrl_max_speed_converted
        task: with_unit
        partial:
          value: ${{ workflow.ptrl_max_speed.return }}
          original_unit: km/h
          new_unit: km/h

      - name: Max Speed Widget
        id: ptrl_max_speed_widget
        task: create_single_value_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: Max Speed (km/h)
          decimal_places: 1
          data: ${{ workflow.ptrl_max_speed_converted.return }}

  # ── Time Density Map ───────────────────────────────────────────────────────────

  - title: Time Density Map
    type: task-group
    description: These settings show a grid-based heatmap showing where subjects spent the most time.
    tasks:
      - id: ptrl_set_ltd_args
        task: set_ltd_args_with_opacity
        partial:
          intersecting_only: false

      - id: ptrl_ltd_meshgrid
        task: call_meshgrid_from_combined_params
        partial:
          aoi: ${{ workflow.ptrl_traj_to_string.return }}
          combined_params: ${{ workflow.ptrl_set_ltd_args.return }}

      - id: ptrl_ltd_opacity
        task: get_opacity_from_combined_params
        partial:
          combined_params: ${{ workflow.ptrl_set_ltd_args.return }}

      - id: ptrl_ltd
        task: call_ltd_from_combined_params
        partial:
          trajectory_gdf: ${{ workflow.ptrl_traj_to_string.return }}
          meshgrid: ${{ workflow.ptrl_ltd_meshgrid.return }}
          combined_params: ${{ workflow.ptrl_set_ltd_args.return }}

      - id: ptrl_ltd_drop_nan
        task: drop_nan_values_by_column
        partial:
          df: ${{ workflow.ptrl_ltd.return }}
          column_name: percentile

      - id: ptrl_ltd_sorted
        task: sort_values
        partial:
          df: ${{ workflow.ptrl_ltd_drop_nan.return }}
          column_name: percentile
          ascending: true
          na_position: last

      - id: ptrl_ltd_to_str
        task: convert_column_values_to_string
        partial:
          df: ${{ workflow.ptrl_ltd_sorted.return }}
          columns:
            - percentile

      - id: ptrl_ltd_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.ptrl_ltd_to_str.return }}
          input_column_name: percentile
          colormap: RdYlGn
          output_column_name: percentile_colormap

      - id: ptrl_ltd_rename
        task: map_columns
        partial:
          df: ${{ workflow.ptrl_ltd_colormap.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            percentile: Percentile
          raise_if_not_found: true

      - name: Create Time Density map layer
        id: ptrl_ltd_layer
        task: create_polygon_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          geodataframe: ${{ workflow.ptrl_ltd_rename.return }}
          layer_style:
            fill_color_column: percentile_colormap
            opacity: ${{ workflow.ptrl_ltd_opacity.return }}
            get_line_width: 0
          legend:
            label_column: Percentile
            label_suffix: ' %'
            color_column: percentile_colormap
          tooltip_columns:
            - Percentile

      - name: Draw Time Density Ecomap
        id: ptrl_ltd_map
        task: draw_ecomap
        partial:
          geo_layers: ${{ workflow.ptrl_ltd_layer.return }}
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: Time Spent
            format_title: false
            placement: bottom-right
          static: false
          title: null
          max_zoom: 20
          widget_id: ${{ workflow.ptrl_set_ltd_map_title.return }}

      - id: ptrl_ltd_map_url
        task: persist_text
        partial:
          text: ${{ workflow.ptrl_ltd_map.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ptrl_ltd_map

      - name: Time Density Map Widget
        id: ptrl_ltd_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ptrl_set_ltd_map_title.return }}
          data: ${{ workflow.ptrl_ltd_map_url.return }}

  # ── Dashboard ─────────────────────────────────────────────────────────────────

  - name: Operations Dashboard
    id: dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        # Events
        - ${{ workflow.ev_count_widget.return }}
        - ${{ workflow.ev_map_widget.return }}
        - ${{ workflow.ev_bar_chart_widget.return }}
        - ${{ workflow.ev_pie_chart_widget.return }}
        - ${{ workflow.ev_count_heatmap_widget.return }}
        # Event Details
        - ${{ workflow.ed_count_widget.return }}
        - ${{ workflow.ed_stats_table_widget.return }}
        - ${{ workflow.ed_pie_chart_widget.return }}
        - ${{ workflow.ed_map_widget.return }}
        - ${{ workflow.ed_bar_chart_widget.return }}
        - ${{ workflow.ed_sum_map_widget.return }}
        - ${{ workflow.ed_events_table_widget.return }}
        # Patrols
        - ${{ workflow.ptrl_total_patrols_widget.return }}
        - ${{ workflow.ptrl_time_widget.return }}
        - ${{ workflow.ptrl_dist_widget.return }}
        - ${{ workflow.ptrl_avg_speed_widget.return }}
        - ${{ workflow.ptrl_max_speed_widget.return }}
        - ${{ workflow.ptrl_map_widget.return }}
        - ${{ workflow.ptrl_ltd_widget.return }}
      time_range: ${{ workflow.time_range.return }}
