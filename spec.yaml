id: ops_dashboard

requirements:
  - name: ecoscope-platform
    version: "2.15.1"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  # re-stated as workaround: https://github.com/wildlife-dynamics/wt/issues/167#issuecomment-4451993697
  - name: pydeck
    version: "0.9.2"
    channel: conda-forge

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

rjsf-overrides:
  properties:
    # Events — ev_get_events is at global level
    ev_get_events.properties.event_types.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: event_type
          depends_on: properties.er_client_name.properties.data_source.properties.name

    # Event Details — dynamic dropdowns driven by selected event type
    Event Details.properties.ed_params.properties.event_type.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: event_type_schema_properties
          depends_on: properties.er_client_name.properties.data_source.properties.name
    Event Details.properties.ed_params.properties.analysis_field.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: event_type_schema_numeric_prop
          depends_on: properties.Event Details.properties.ed_params.properties.event_type
    Event Details.properties.ed_params.properties.category_field.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: event_type_schema_choice_prop
          depends_on: properties.Event Details.properties.ed_params.properties.event_type

    # Patrols — populate patrol type and event type dropdowns from ER
    Patrols.properties.ptrl_params.properties.patrol_types.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: patrol_type
          depends_on: properties.er_client_name.properties.data_source.properties.name

    # Trajectory colour column — lives in its own Trajectory Category task-group
    Trajectory Category.properties.ptrl_set_color_column.properties.var.oneOf:
      - const: patrol_type
        title: Patrol Type
      - const: patrol_status
        title: Patrol Status
      - const: patrol_subject
        title: Patrol Subject
      - const: patrol_serial_number
        title: Serial Number
    Trajectory Category.properties.ptrl_set_color_column.properties.var.title: Category
    Trajectory Category.properties.ptrl_set_color_column.properties.var.default: patrol_type

    # Time Density opacity default — ptrl_set_ltd_args lives in Time Density Map task-group
    Time Density Map.properties.ptrl_set_ltd_args.properties.opacity.default: 0.700000

    # Time Interval — global shared setting for all bar charts
    time_interval.properties.var.oneOf:
      - const: year
        title: Year
      - const: month
        title: Month
      - const: week
        title: Week
      - const: day
        title: Day
      - const: hour
        title: Hour
    time_interval.properties.var.title: Time Interval
    time_interval.properties.var.default: month

  uiSchema:
    # Hide redundant labels on array items
    ev_filter.filter_point_coords.items.ui:options.label: false
    base_map_defs.base_maps.items.ui:options.label: false

    # Event Count Map — meshgrid cell size widget
    Event Count Map.ev_meshgrid.auto_scale_or_custom_cell_size:
      anyOf:
        - ui:help: Auto-scale for an optimized grid cell size based on the workflow data, or Customize to set a specific grid cell size.
          ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
        - ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
      auto_scale_or_custom:
        ui:widget: hidden

    # Event Details — sum density meshgrid cell size widget
    Analysis Field Sum Map.ed_sum_meshgrid.auto_scale_or_custom_cell_size:
      anyOf:
        - ui:help: Auto-scale for an optimized grid cell size based on the workflow data, or Customize to set a specific grid cell size.
          ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
        - ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
      auto_scale_or_custom:
        ui:widget: hidden

    # Time Density — meshgrid cell size widget (ptrl_set_ltd_args is inside Time Density Map)
    Time Density Map.ptrl_set_ltd_args.auto_scale_or_custom_cell_size:
      anyOf:
        - ui:help: Auto-scale for an optimized grid cell size based on the workflow data, or Customize to set a specific grid cell size.
          ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
        - ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
      auto_scale_or_custom:
        ui:widget: hidden

workflow:

  # ── Global ───────────────────────────────────────────────────────────────────

  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: er_client_name
    task: set_er_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: '%d %b %Y %H:%M:%S'

  - id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  - name: Map Base Layers
    id: base_map_defs
    task: set_base_maps

  - id: ev_get_events
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
      raise_on_empty: false
      include_details: false
      include_updates: false
      include_related_events: false
      include_display_values: true
      include_null_geometry: false

  - name: Convert to timezone
    id: ev_convert_tz
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.ev_get_events.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns:
        - time

  - name: Extract reported_by_name from Events
    id: ev_extract_reported_by
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.ev_convert_tz.return }}
      column_name: reported_by
      field_name_options:
        - name
      output_type: str
      output_column_name: reported_by_name

  - name: Event Location Filter
    id: ev_filter
    task: apply_reloc_coord_filter
    partial:
      df: ${{ workflow.ev_extract_reported_by.return }}
      roi_gdf: null
      roi_name: null
      reset_index: true

  - name: Events Bar Chart
    id: time_interval
    task: set_string_var

  # ── Events ───────────────────────────────────────────────────────────────────

  - title: Events
    type: task-group
    description: >-
      Select one or more event types to visualize on the map, bar chart, and pie chart.
      Leave event_types empty to include all events.
    tasks:
      - id: ev_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.ev_filter.return }}
          input_column_name: event_type
          colormap: tab20b
          output_column_name: event_type_colormap

      - id: ev_set_map_title
        task: set_string_var
        partial:
          var: Events Map

      - id: ev_set_bar_chart_title
        task: set_string_var
        partial:
          var: Events Bar Chart

      - id: ev_set_pie_chart_title
        task: set_string_var
        partial:
          var: Events Pie Chart

      - id: ev_rename_cols
        task: map_columns
        partial:
          df: ${{ workflow.ev_colormap.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            serial_number: Event Serial
            time: Event Time
            event_type_display: Event Type
            reported_by_name: Reported By
          raise_if_not_found: true

      - name: Create map layer from Events
        id: ev_map_layer
        task: create_point_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          geodataframe: ${{ workflow.ev_rename_cols.return }}
          layer_style:
            fill_color_column: event_type_colormap
            get_radius: 5
          legend:
            label_column: Event Type
            color_column: event_type_colormap
          tooltip_columns:
            - Event Serial
            - Event Time
            - Event Type
            - Reported By

      - name: Draw Events Ecomap
        id: ev_map
        task: draw_ecomap
        partial:
          geo_layers: ${{ workflow.ev_map_layer.return }}
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: Event Type
            format_title: false
            placement: bottom-right
          static: false
          title: null
          max_zoom: 20
          widget_id: ${{ workflow.ev_set_map_title.return }}

      - id: ev_map_url
        task: persist_text
        partial:
          text: ${{ workflow.ev_map.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ev_map

      - name: Events Map Widget
        id: ev_map_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ev_set_map_title.return }}
          data: ${{ workflow.ev_map_url.return }}

      - id: ev_bar_chart
        task: draw_time_series_bar_chart
        partial:
          dataframe: ${{ workflow.ev_colormap.return }}
          x_axis: time
          y_axis: event_type_display
          category: event_type_display
          agg_function: count
          color_column: event_type_colormap
          time_interval: ${{ workflow.time_interval.return }}
          plot_style:
            xperiodalignment: middle
          layout_style: null
          widget_id: ${{ workflow.ev_set_bar_chart_title.return }}

      - id: ev_bar_chart_url
        task: persist_text
        partial:
          text: ${{ workflow.ev_bar_chart.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ev_bar_chart

      - name: Events Bar Chart Widget
        id: ev_bar_chart_widget
        task: create_plot_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ev_set_bar_chart_title.return }}
          data: ${{ workflow.ev_bar_chart_url.return }}

      - id: ev_pie_chart
        task: draw_pie_chart
        partial:
          dataframe: ${{ workflow.ev_colormap.return }}
          value_column: event_type_display
          color_column: event_type_colormap
          plot_style:
            textinfo: value
          label_column: null
          layout_style: null
          widget_id: ${{ workflow.ev_set_pie_chart_title.return }}

      - id: ev_pie_chart_url
        task: persist_text
        partial:
          text: ${{ workflow.ev_pie_chart.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ev_pie_chart

      - name: Events Pie Chart Widget
        id: ev_pie_chart_widget
        task: create_plot_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ev_set_pie_chart_title.return }}
          data: ${{ workflow.ev_pie_chart_url.return }}

      - id: ev_count
        task: dataframe_count
        partial:
          df: ${{ workflow.ev_filter.return }}

      - name: Total Events Widget
        id: ev_count_widget
        task: create_single_value_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: Total Events
          decimal_places: 0
          data: ${{ workflow.ev_count.return }}

  # ── Event Count Map ──────────────────────────────────────────────────────────

  - title: Event Count Map
    type: task-group
    description: >-
      Grid-based heatmap showing where events are concentrated. The grid is
      divided into equal-interval density bins coloured from green (low) to red (high).
    tasks:
      - id: ev_set_fd_map_title
        task: set_string_var
        partial:
          var: Event Count Map

      - id: ev_meshgrid
        task: create_meshgrid
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          aoi: ${{ workflow.ev_filter.return }}
          intersecting_only: false

      - id: ev_fd_count_map
        task: calculate_feature_density
        partial:
          geodataframe: ${{ workflow.ev_filter.return }}
          meshgrid: ${{ workflow.ev_meshgrid.return }}
          geometry_type: point
          sum_column: null

      - id: ev_fd_sorted
        task: sort_values
        partial:
          df: ${{ workflow.ev_fd_count_map.return }}
          column_name: density
          ascending: true
          na_position: last

      - id: ev_fd_drop_nan
        task: drop_nan_values_by_column
        partial:
          df: ${{ workflow.ev_fd_sorted.return }}
          column_name: density

      - id: ev_fd_classify
        task: apply_classification
        partial:
          df: ${{ workflow.ev_fd_drop_nan.return }}
          input_column_name: density
          output_column_name: density_bins
          classification_options:
            scheme: equal_interval
            k: 10
          label_options:
            label_ranges: true
            label_decimals: 0

      - id: ev_fd_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.ev_fd_classify.return }}
          input_column_name: density_bins
          colormap: RdYlGn_r
          output_column_name: density_colormap

      - id: ev_fd_rename
        task: map_columns
        partial:
          df: ${{ workflow.ev_fd_colormap.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            density: Count
          raise_if_not_found: true

      - name: Create Event Count map layer
        id: ev_fd_layer
        task: create_polygon_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          geodataframe: ${{ workflow.ev_fd_rename.return }}
          layer_style:
            fill_color_column: density_colormap
            get_line_width: 0
            opacity: 0.400000
          legend:
            label_column: density_bins
            color_column: density_colormap
          tooltip_columns:
            - Count

      - name: Draw Event Count Ecomap
        id: ev_count_heatmap
        task: draw_ecomap
        partial:
          geo_layers: ${{ workflow.ev_fd_layer.return }}
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: Number Of Events
            format_title: false
            placement: bottom-right
          static: false
          title: null
          max_zoom: 20
          widget_id: ${{ workflow.ev_set_fd_map_title.return }}

      - id: ev_count_heatmap_url
        task: persist_text
        partial:
          text: ${{ workflow.ev_count_heatmap.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ev_count_heatmap

      - name: Event Count Map Widget
        id: ev_count_heatmap_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ev_set_fd_map_title.return }}
          data: ${{ workflow.ev_count_heatmap_url.return }}

  # ── Event Details ─────────────────────────────────────────────────────────────

  - title: Event Details
    type: task-group
    description: >-
      Deep-dive into a single event type with a numeric analysis field (e.g. fines
      collected, animals seized). Configure event_type, analysis_field, and
      optionally a category_field. Leave event_type blank to skip this section.
    tasks:
      - name: Event Details Parameters
        id: ed_params
        task: set_event_details_params
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          event_columns:
            - id
            - time
            - event_type
            - event_category
            - reported_by
            - serial_number
            - location
            - event_details
            - geometry
          raise_on_empty: false
          include_details: true
          include_updates: false
          include_related_events: false
          include_display_values: false
          include_null_geometry: false

  - id: ed_analysis_field
    task: get_analysis_field_from_event_details
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - id: ed_analysis_field_label
    task: get_analysis_field_label_from_event_details
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - id: ed_analysis_field_unit
    task: get_analysis_field_unit_from_event_details
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - id: ed_category_field
    task: get_category_field_from_event_details
    skipif:
      conditions:
        - any_dependency_is_none
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - id: ed_category_field_label
    task: get_category_field_label_from_event_details
    skipif:
      conditions:
        - any_dependency_is_none
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - id: ed_event_type
    task: get_event_type_from_event_details
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - id: ed_get_events
    task: get_events_from_combined_params
    partial:
      combined_params: ${{ workflow.ed_params.return }}

  - name: Convert to timezone
    id: ed_convert_tz
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.ed_get_events.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns:
        - time

  - name: Extract Latitude from Events
    id: ed_extract_lat
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.ed_convert_tz.return }}
      column_name: location
      field_name_options:
        - latitude
      output_type: str
      output_column_name: latitude

  - name: Extract Longitude from Events
    id: ed_extract_lon
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.ed_extract_lat.return }}
      column_name: location
      field_name_options:
        - longitude
      output_type: str
      output_column_name: longitude

  - name: Extract reported_by_name from Event Details
    id: ed_extract_reported_by
    task: extract_value_from_json_column
    partial:
      df: ${{ workflow.ed_extract_lon.return }}
      column_name: reported_by
      field_name_options:
        - name
      output_type: str
      output_column_name: reported_by_name

  - name: Event Details Location Filter
    id: ed_filter
    task: apply_reloc_coord_filter
    partial:
      df: ${{ workflow.ed_extract_reported_by.return }}
      roi_gdf: null
      roi_name: null
      reset_index: true

  - name: Normalize event details
    id: ed_normalize
    task: normalize_json_column
    partial:
      df: ${{ workflow.ed_filter.return }}
      column: event_details
      skip_if_not_exists: false
      sort_columns: false

  - id: ed_strip_prefix
    task: strip_prefix_from_column_names
    partial:
      df: ${{ workflow.ed_normalize.return }}
      prefix: event_details__

  - id: ed_add_default_category
    task: assign_value
    partial:
      df: ${{ workflow.ed_strip_prefix.return }}
      column_name: default_category
      value: ${{ workflow.ed_analysis_field_unit.return }}
      noop_if_column_exists: false

  - id: ed_default_category_field
    task: default_if_string_is_empty
    partial:
      value: ${{ workflow.ed_category_field.return }}
      default: default_category

  - id: ed_category_label_or_field
    task: default_if_string_is_empty
    partial:
      value: ${{ workflow.ed_category_field_label.return }}
      default: ${{ workflow.ed_category_field.return }}

  - id: ed_default_category_label
    task: default_if_string_is_empty
    partial:
      value: ${{ workflow.ed_category_label_or_field.return }}
      default: ${{ workflow.ed_category_field.return }}

  - id: ed_ensure_analysis
    task: assign_value
    partial:
      df: ${{ workflow.ed_add_default_category.return }}
      column_name: ${{ workflow.ed_analysis_field.return }}
      value: null
      noop_if_column_exists: true

  - id: ed_ensure_category
    task: assign_value
    partial:
      df: ${{ workflow.ed_ensure_analysis.return }}
      column_name: ${{ workflow.ed_default_category_field.return }}
      value: None
      noop_if_column_exists: true

  - id: ed_ensure_numeric
    task: convert_column_values_to_numeric
    partial:
      df: ${{ workflow.ed_ensure_category.return }}
      columns:
        - ${{ workflow.ed_analysis_field.return }}

  - id: ed_colormap
    task: apply_color_map
    partial:
      df: ${{ workflow.ed_ensure_numeric.return }}
      input_column_name: ${{ workflow.ed_default_category_field.return }}
      colormap:
        - '#312B86'
        - '#08D1CC'
        - '#FF3FB3'
        - '#20BF55'
        - '#FF9F1C'
        - '#6460B0'
        - '#FF7FCC'
        - '#4DE3DD'
        - '#6BE39A'
        - '#FFC46F'
        - '#1E215C'
        - '#C80088'
        - '#008784'
        - '#08853A'
        - '#C46C00'
      output_column_name: ed_colormap

  - id: ed_set_count_title
    task: concat_string_vars
    skipif:
      conditions:
        - never
    partial:
      values:
        - ${{ workflow.ed_analysis_field_label.return }}
        - ' Events'

  - id: ed_set_summary_title
    task: set_string_var
    partial:
      var: Summary Statistics

  - id: ed_set_table_title
    task: set_string_var
    partial:
      var: Events Table

  - id: ed_map_title_pt1
    task: concat_string_vars
    skipif:
      conditions:
        - never
    partial:
      values:
        - ${{ workflow.ed_analysis_field_label.return }}
        - ' Locations'

  - id: ed_set_map_title
    task: default_if_string_is_empty
    skipif:
      conditions:
        - never
    partial:
      value: ${{ workflow.ed_map_title_pt1.return }}
      default: Event Details Map

  - id: ed_bar_chart_title_pt1
    task: concat_string_vars
    skipif:
      conditions:
        - never
    partial:
      values:
        - ${{ workflow.ed_analysis_field_label.return }}
        - ' Over Time'

  - id: ed_set_bar_chart_title
    task: default_if_string_is_empty
    skipif:
      conditions:
        - never
    partial:
      value: ${{ workflow.ed_bar_chart_title_pt1.return }}
      default: Event Details Bar Chart

  - id: ed_pie_title_pt1
    task: concat_string_vars
    skipif:
      conditions:
        - never
    partial:
      values:
        - 'Proportion of '
        - ${{ workflow.ed_analysis_field_label.return }}

  - id: ed_set_pie_chart_title
    task: default_if_string_is_empty
    skipif:
      conditions:
        - never
    partial:
      value: ${{ workflow.ed_pie_title_pt1.return }}
      default: Event Details Pie Chart

  - id: ed_sum_map_title_pt1
    task: concat_string_vars
    skipif:
      conditions:
        - never
    partial:
      values:
        - ${{ workflow.ed_analysis_field_label.return }}
        - ' Sum Map'

  - id: ed_set_sum_map_title
    task: default_if_string_is_empty
    skipif:
      conditions:
        - never
    partial:
      value: ${{ workflow.ed_sum_map_title_pt1.return }}
      default: Analysis Field Sum Map

  - id: ed_count
    task: dataframe_count
    partial:
      df: ${{ workflow.ed_ensure_numeric.return }}

  - name: Total Events Widget
    id: ed_count_widget
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: ${{ workflow.ed_set_count_title.return }}
      decimal_places: 0
      data: ${{ workflow.ed_count.return }}

  - id: ed_drop_nan_analysis
    task: drop_nan_values_by_column
    partial:
      df: ${{ workflow.ed_colormap.return }}
      column_name: ${{ workflow.ed_analysis_field.return }}

  - id: ed_summary_stats
    task: summarize_df
    partial:
      df: ${{ workflow.ed_drop_nan_analysis.return }}
      groupby_cols: null
      reset_index: false
      summary_params:
        - display_name: Sum
          aggregator: sum
          column: ${{ workflow.ed_analysis_field.return }}
        - display_name: Min
          aggregator: min
          column: ${{ workflow.ed_analysis_field.return }}
        - display_name: Max
          aggregator: max
