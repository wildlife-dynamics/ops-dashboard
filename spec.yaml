        - display_name: Median
          aggregator: median
          column: ${{ workflow.ed_analysis_field.return }}
        - display_name: Mean
          aggregator: mean
          column: ${{ workflow.ed_analysis_field.return }}

  - id: ed_transpose
    task: transpose
    partial:
