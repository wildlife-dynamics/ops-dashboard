      data: ${{ workflow.ed_map_url.return }}

  # ── Events Bar Chart ──────────────────────────────────────────────────────────

  - title: Events Bar Chart
    type: task-group
    description: The bar chart shows how the analysis field value varied over time. Choose the time interval for the x-axis to control how values are summarized.
    tasks:
      - id: ed_bar_chart
        task: draw_time_series_bar_chart
        partial:
          dataframe: ${{ workflow.ed_drop_nan_analysis.return }}
          x_axis: time
          y_axis: ${{ workflow.ed_analysis_field.return }}
          category: ${{ workflow.ed_default_category_field.return }}
          agg_function: sum
          color_column: ed_colormap
          plot_style:
            xperiodalignment: middle
          layout_style: null
          widget_id: ${{ workflow.ed_set_bar_chart_title.return }}

      - id: ed_bar_chart_url
        task: persist_text
        partial:
          text: ${{ workflow.ed_bar_chart.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ed_bar_chart

      - name: Event Details Bar Chart Widget
        id: ed_bar_chart_widget
        task: create_plot_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ed_set_bar_chart_title.return }}
          data: ${{ workflow.ed_bar_chart_url.return }}

  # ── Analysis Field Sum Map ────────────────────────────────────────────────────

  - title: Analysis Field Sum Map
    type: task-group
    description: These settings generate a grid-based heatmap showing where events are concentrated.
    tasks:
      - id: ed_sum_meshgrid
        task: create_meshgrid
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          aoi: ${{ workflow.ed_filter.return }}
          intersecting_only: false

      - id: ed_sum_map_density
        task: calculate_feature_density
        partial:
          geodataframe: ${{ workflow.ed_drop_nan_analysis.return }}
          meshgrid: ${{ workflow.ed_sum_meshgrid.return }}
          geometry_type: point
          sum_column: ${{ workflow.ed_analysis_field.return }}

      - id: ed_sum_drop_nan
        task: drop_nan_values_by_column
        partial:
          df: ${{ workflow.ed_sum_map_density.return }}
          column_name: density

      - id: ed_sum_sorted
        task: sort_values
        partial:
          df: ${{ workflow.ed_sum_drop_nan.return }}
          column_name: density
          ascending: true
          na_position: last

      - id: ed_sum_classify
        task: apply_classification
        partial:
          df: ${{ workflow.ed_sum_sorted.return }}
          input_column_name: density
          output_column_name: density_bins
          classification_options:
            scheme: equal_interval
            k: 9
          label_options:
            label_ranges: true
            label_decimals: 0

      - id: ed_sum_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.ed_sum_classify.return }}
          input_column_name: density_bins
          colormap:
            - '#5C4FE7'
            - '#269CD5'
            - '#00D0C8'
            - '#81D670'
            - '#FFD000'
            - '#F9BB12'
            - '#FF9600'
            - '#FA7306'
            - '#F23B0E'
          output_column_name: density_colormap

      - id: ed_sum_rename
        task: map_columns
        partial:
          df: ${{ workflow.ed_sum_colormap.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            density: Sum
          raise_if_not_found: true

      - name: Create Analysis Field Sum map layer
        id: ed_sum_layer
        task: create_polygon_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          geodataframe: ${{ workflow.ed_sum_rename.return }}
          layer_style:
            fill_color_column: density_colormap
            get_line_width: 0
            opacity: 0.400000
          legend:
            label_column: density_bins
            color_column: density_colormap
          tooltip_columns:
            - Sum

      - name: Draw Analysis Field Sum Ecomap
        id: ed_sum_map
        task: draw_ecomap
        partial:
          geo_layers: ${{ workflow.ed_sum_layer.return }}
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: ${{ workflow.ed_analysis_field_unit.return }}
            format_title: false
            placement: bottom-right
          static: false
          title: null
          max_zoom: 20
          widget_id: ${{ workflow.ed_set_sum_map_title.return }}

      - id: ed_sum_map_url
        task: persist_text
        partial:
          text: ${{ workflow.ed_sum_map.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ed_sum_map

      - name: Analysis Field Sum Map Widget
        id: ed_sum_map_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ed_set_sum_map_title.return }}
          data: ${{ workflow.ed_sum_map_url.return }}

  - id: ed_events_table
    task: draw_table
    partial:
      dataframe: ${{ workflow.ed_rename_cols.return }}
      table_config:
        enable_sorting: true
        enable_filtering: false
        enable_download: true
        hide_header: false
      widget_id: ${{ workflow.ed_set_table_title.return }}

  - id: ed_events_table_url
    task: persist_text
    partial:
      text: ${{ workflow.ed_events_table.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: ed_events_table

  - name: Events Table Widget
    id: ed_events_table_widget
    task: create_table_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: ${{ workflow.ed_set_table_title.return }}
      data: ${{ workflow.ed_events_table_url.return }}

  # ── Trajectory Category ──────────────────────────────────────────────────────

  - title: Trajectory Category
    type: task-group
    description: Choose the patrol attribute used to colour trajectory lines on the map.
    tasks:
      - id: ptrl_set_color_column
        task: set_string_var

      - id: ptrl_color_column_display
        task: title_case_var
        partial:
          var: ${{ workflow.ptrl_set_color_column.return }}

  # ── Patrol and Event Types ────────────────────────────────────────────────────

  - title: Patrols
    type: task-group
    description: ' '
    tasks:
      - id: ptrl_params
        task: set_patrols_and_patrol_events_params
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          event_types: []
          include_patrol_details: true
          raise_on_empty: false
          truncate_to_time_range: true
          sub_page_size: 100
          patrols_overlap_daterange: true

      - id: ptrl_prefetch
        task: get_patrols_from_combined_params
        partial:
          combined_params: ${{ workflow.ptrl_params.return }}

      - id: ptrl_obs
        task: get_patrol_observations_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.ptrl_prefetch.return }}
          combined_params: ${{ workflow.ptrl_params.return }}

  - name: Convert patrols to timezone
    id: ptrl_convert_tz
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.ptrl_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns:
        - patrol_start_time
        - patrol_end_time
        - fixtime

  - name: Transform Observations to Relocations
    id: ptrl_reloc
    task: process_relocations
    partial:
      observations: ${{ workflow.ptrl_convert_tz.return }}
      relocs_columns:
        - patrol_id
        - patrol_start_time
        - patrol_end_time
        - patrol_type__value
        - patrol_type__display
        - patrol_serial_number
        - patrol_status
        - patrol_subject
        - groupby_col
        - fixtime
        - junk_status
        - geometry
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  # ── Trajectory Segment Filter ─────────────────────────────────────────────────

  - title: Trajectory Segment Filter
    type: task-group
    description: ' '
    tasks:
      - id: ptrl_traj
        task: relocations_to_trajectory
        partial:
          relocations: ${{ workflow.ptrl_reloc.return }}

      - id: ptrl_rename_grouper_cols
        task: map_columns
        partial:
          df: ${{ workflow.ptrl_traj.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            extra__patrol_type__value: patrol_type
            extra__patrol_serial_number: patrol_serial_number
            extra__patrol_status: patrol_status
            extra__patrol_subject: patrol_subject
          raise_if_not_found: true

      - id: ptrl_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.ptrl_rename_grouper_cols.return }}
          colormap:
            - '#FF9600'
            - '#F23B0E'
            - '#A100CB'
            - '#F04564'
            - '#03421A'
            - '#3089FF'
            - '#E26FFF'
            - '#8C1700'
            - '#002960'
            - '#FFD000'
            - '#B62879'
            - '#680078'
            - '#005A56'
            - '#0056C7'
            - '#331878'
            - '#E76826'
          input_column_name: ${{ workflow.ptrl_set_color_column.return }}
          output_column_name: patrol_traj_colormap

  - name: Cast Patrol Trajectory Columns
    id: ptrl_traj_to_string
    task: convert_column_values_to_string
    partial:
      df: ${{ workflow.ptrl_colormap.return }}
      columns:
        - patrol_serial_number
        - patrol_type

  - name: Set Combined Trajectory & Event Map Title
    id: ptrl_set_traj_map_title
    task: set_string_var
    partial:
      var: Patrol Trajectories Map

  - name: Set Time Density Map Title
    id: ptrl_set_ltd_map_title
    task: set_string_var
    partial:
      var: Time Density Map

  # ── Patrol Events and Trajectories Map ────────────────────────────────────────

  - title: Patrol Events and Trajectories Map
    type: task-group
    description: Create a combined patrol trajectories and events map.
    tasks:
      - id: ptrl_speed_with_unit
        task: map_values_with_unit
        partial:
          df: ${{ workflow.ptrl_traj_to_string.return }}
          input_column_name: speed_kmhr
          output_column_name: speed_kmhr
          original_unit: km/h
          new_unit: km/h
          decimal_places: 1

      - id: ptrl_traj_rename
        task: map_columns
        partial:
          df: ${{ workflow.ptrl_speed_with_unit.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            patrol_serial_number: Patrol Serial Number
            patrol_status: Patrol Status
            patrol_subject: Patrol Subject
            extra__patrol_type__display: Patrol Type
            segment_start: Start
            timespan_seconds: Duration (s)
            speed_kmhr: Speed (kph)
          raise_if_not_found: true

      - id: ptrl_traj_status_rename
        task: map_values
        partial:
          df: ${{ workflow.ptrl_traj_rename.return }}
          column_name: Patrol Status
          value_map:
            active: Active
            overdue: Overdue
            done: Done
            cancelled: Cancelled
          missing_values: remove
          replacement: null

      - name: Create Patrol Trajectories map layer
        id: ptrl_traj_map_layer
        task: create_polyline_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          geodataframe: ${{ workflow.ptrl_traj_status_rename.return }}
          layer_style:
            auto_highlight: false
            opacity: 1.000000
            pickable: true
            get_color: null
            get_width: 3.000000
            color_column: patrol_traj_colormap
            width_units: pixels
            cap_rounded: true
          legend:
            label_column: ${{ workflow.ptrl_color_column_display.return }}
            color_column: patrol_traj_colormap
          tooltip_columns:
            - Patrol Serial Number
            - Patrol Type
            - Start
            - Duration (s)
            - Speed (kph)

      - name: Draw Patrol Trajectories Ecomap
        id: ptrl_map
        task: draw_ecomap
        partial:
          geo_layers:
            - ${{ workflow.ptrl_traj_map_layer.return }}
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: ${{ workflow.ptrl_color_column_display.return }}
            format_title: true
            placement: bottom-right
          static: false
          title: null
          max_zoom: 20
          widget_id: ${{ workflow.ptrl_set_traj_map_title.return }}

      - id: ptrl_map_url
        task: persist_text
        partial:
          text: ${{ workflow.ptrl_map.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ptrl_map

      - name: Patrol Tracks Map Widget
        id: ptrl_map_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.ptrl_set_traj_map_title.return }}
          data: ${{ workflow.ptrl_map_url.return }}

  # ── Patrol Summary Statistics ──────────────────────────────────────────────────

  - title: Patrol Summary Statistics
    type: task-group
    description: Create a single value widget for various patrol statistics.
    tasks:
      - id: ptrl_total_patrols
        task: dataframe_column_nunique
        partial:
          df: ${{ workflow.ptrl_traj_to_string.return }}
          column_name: extra__patrol_id

      - name: Total Patrols Widget
        id: ptrl_total_patrols_widget
        task: create_single_value_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: Total Patrols
          decimal_places: 0
          data: ${{ workflow.ptrl_total_patrols.return }}

      - id: ptrl_total_time
        task: dataframe_column_sum
        partial:
          df: ${{ workflow.ptrl_traj_to_string.return }}
          column_name: timespan_seconds

      - id: ptrl_total_time_converted
        task: with_unit
        partial:
          value: ${{ workflow.ptrl_total_time.return }}
          original_unit: s
          new_unit: h

      - name: Total Time Widget
        id: ptrl_time_widget
        task: create_single_value_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: Total Time (h)
          decimal_places: 1
          data: ${{ workflow.ptrl_total_time_converted.return }}

      - id: ptrl_total_dist
        task: dataframe_column_sum
        partial:
