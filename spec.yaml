        partial:
          title: Total Distance (km)
          decimal_places: 1
          data: ${{ workflow.ptrl_total_dist_converted.return }}

      - id: ptrl_avg_speed
        task: dataframe_column_mean
        partial:
          df: ${{ workflow.ptrl_traj_to_string.return }}
