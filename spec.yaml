      color_column: ed_colormap
      plot_style:
        textinfo: value
      label_column: ${{ workflow.ed_default_category_field.return }}
      layout_style: null
      widget_id: ${{ workflow.ed_set_pie_chart_title.return }}

  - id: ed_pie_chart_url
    task: persist_text
    partial:
      text: ${{ workflow.ed_pie_chart.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: ed_pie_chart

  - name: Event Details Pie Chart Widget
    id: ed_pie_chart_widget
    task: create_plot_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: ${{ workflow.ed_set_pie_chart_title.return }}
      data: ${{ workflow.ed_pie_chart_url.return }}

  - id: ed_normalize_analysis
    task: normalize_numeric_column
    partial:
      df: ${{ workflow.ed_drop_nan_analysis.return }}
      column: ${{ workflow.ed_analysis_field.return }}
      output_column_name: normalized_analysis_field

  - id: ed_drop_empty_geometry
    task: drop_null_geometry
    partial:
      gdf: ${{ workflow.ed_normalize_analysis.return }}

  - id: ed_rename_cols
    task: map_columns
    partial:
      df: ${{ workflow.ed_drop_empty_geometry.return }}
      drop_columns:
        - reported_by
        - location
        - updates
      retain_columns: []
      rename_columns:
        serial_number: Serial Number
        time: Event Time
        reported_by_name: Reported By
        latitude: Latitude
        longitude: Longitude
      raise_if_not_found: false

  - name: Create Event Details map layer
    id: ed_map_layer
    task: create_point_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
        - all_geometry_are_none
    partial:
      geodataframe: ${{ workflow.ed_rename_cols.return }}
      layer_style:
        fill_color_column: ed_colormap
        get_radius: normalized_analysis_field
        stroked: true
        get_line_color: '#FFFFFF'
        radius_scale: 5
      legend:
        label_column: ${{ workflow.ed_default_category_field.return }}
        color_column: ed_colormap
      tooltip_columns:
        - Serial Number
        - Event Time
        - Reported By

  - name: Draw Event Details Ecomap
    id: ed_map
    task: draw_ecomap
    partial:
      geo_layers: ${{ workflow.ed_map_layer.return }}
      tile_layers: ${{ workflow.base_map_defs.return }}
      north_arrow_style:
        placement: top-left
      legend_style:
        title: ${{ workflow.ed_default_category_label.return }}
        format_title: false
        placement: bottom-right
      static: false
      title: null
      max_zoom: 20
      widget_id: ${{ workflow.ed_set_map_title.return }}

  - id: ed_map_url
    task: persist_text
    partial:
      text: ${{ workflow.ed_map.return }}
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: ed_map

  - name: Event Details Map Widget
    id: ed_map_widget
    task: create_map_widget_single_view
    skipif:
